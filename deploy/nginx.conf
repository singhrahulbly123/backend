user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Brotli (if compiled)
    brotli on;
    brotli_comp_level 5;
    brotli_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    upstream laravel_backend {
        server 127.0.0.1:8000;
    }

    server {
        listen 80;
        server_name example.com;
        root /var/www/frontend; # Next.js out or public folder

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # Frontend (Next.js) assets
        location /_next/ {
            alias /var/www/frontend/.next/;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
        }

        location /static/ {
            alias /var/www/frontend/public/;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
        }

        # API proxy to Laravel backend
        location /api/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://laravel_backend;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Serve media and public files with aggressive caching and fallback
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|webp|avif)$ {
            root /var/www/frontend/public;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
            try_files $uri $uri/ =404;
        }

        # Fallback to Next.js app (static export) or proxy to node server if SSR
        location / {
            try_files $uri $uri/ @nextjs;
        }

        location @nextjs {
            # If using a standalone Next server, proxy here
            proxy_pass http://127.0.0.1:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
